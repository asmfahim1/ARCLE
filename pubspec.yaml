name: arcle
description: A Flutter CLI to scaffold Clean Architecture projects with BLoC, GetX, or Riverpod. Easily generate features, routing, and DI.
version: 1.0.1
homepage: https://github.com/asmfahim1/ARCLE
repository: https://github.com/asmfahim1/ARCLE
issue_tracker: https://github.com/asmfahim1/ARCLE/issues
documentation: https://github.com/asmfahim1/ARCLE#readme

topics:
  - cli
  - flutter
  - clean-architecture
  - code-generator
  - scaffolding

# Uncomment and add screenshot when available:
# screenshots:
#   - description: 'ARCLE CLI creating a new Flutter project'
#     path: screenshots/create.png

environment:
  sdk: ^3.5.4

# This is the MAGIC part.
# It tells Dart: "When I type 'arcle', run bin/arcle.dart"
executables:
  arcle: arcle

dependencies:
  args: ^2.4.0
  io: ^1.0.5

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
