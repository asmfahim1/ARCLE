name: arcle
description: >-
  A production-ready Flutter CLI that scaffolds Clean Architecture projects
  with BLoC, GetX, or Riverpod state management. Generate features, DI wiring,
  routing, and build APKs with ease.
version: 1.0.0
homepage: https://github.com/ArcleApp/arcle
repository: https://github.com/ArcleApp/arcle
issue_tracker: https://github.com/ArcleApp/arcle/issues
documentation: https://github.com/ArcleApp/arcle#readme

topics:
  - cli
  - flutter
  - clean-architecture
  - code-generator
  - scaffolding

# Uncomment and add screenshot when available:
# screenshots:
#   - description: 'ARCLE CLI creating a new Flutter project'
#     path: screenshots/create.png

environment:
  sdk: ^3.5.4

# This is the MAGIC part.
# It tells Dart: "When I type 'arcle', run bin/arcle.dart"
executables:
  arcle: arcle

dependencies:
  args: ^2.4.0
  io: ^1.0.5

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
